name: Feature request
description: Suggest an improvement for PRGate or one of its public repositories.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea for PRGate.
  - type: input
    id: affected-repo
    attributes:
      label: Affected repository
      description: Which PRGate repository should this apply to?
      placeholder: prgate
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
      placeholder: Describe the need or pain point.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see happen?
      placeholder: Describe the change you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other options did you consider?
      placeholder: List alternatives, trade-offs, or workarounds.
  - type: textarea
    id: impact
    attributes:
      label: Expected impact
      description: Who benefits and how?
      placeholder: Explain expected value for users or maintainers.
