name: PRGate Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    name: AI Code Review

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run PRGate review
        uses: prgate-org/prgate@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          config-path: .prgate.yaml
          policy-path: org-policy.yaml
          llm-provider: anthropic
          llm-api-key: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Comment PR if review failed
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ PRGate review encountered an error. Please check the workflow logs.'
            })
